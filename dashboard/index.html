<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Words of Istanbul — urban intelligence dashboard: mood analytics, matrix feed, zone map.">
    <title>Sovereign Intelligence | Words of Istanbul</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside class="panel" aria-label="Urban metrics">
            <div class="panel-header">Urban Metrics</div>
            <div class="widget">
                <div class="glitch-text">ANALYTIC_OVERRIDE_ENABLED</div>
                <p id="matrix-meta" class="meta-line" aria-live="polite"></p>
                <canvas id="moodDistribution" aria-label="Mood distribution radar chart"></canvas>
                <div class="status-block">
                    <div class="panel-header panel-header--inline">System Status</div>
                    <p class="status-copy">
                        Matrix: <span id="sync-label">ETERNAL</span><br>
                        Sync: <span id="sync-state">loading…</span><br>
                        Sovereign layer: ACTIVE
                    </p>
                </div>
            </div>
        </aside>

        <main class="main-view">
            <header class="hero-banner">
                <h1 class="hero-title">WORDS OF ISTANBUL</h1>
            </header>

            <div class="command-bar" role="toolbar" aria-label="Feed controls">
                <label class="sr-only" for="feed-search">Search matrix</label>
                <input type="search" id="feed-search" class="feed-search" placeholder="Ara: hüzün, boğaz, layer…" autocomplete="off">
                <label class="sr-only" for="layer-filter">Filter by layer</label>
                <select id="layer-filter" class="feed-select" aria-label="Filter by layer">
                    <option value="">Tüm katmanlar</option>
                </select>
                <button type="button" id="btn-oracle" class="btn-ghost">Oracle</button>
                <button type="button" id="btn-derive" class="btn-ghost">Dérive</button>
            </div>

            <div class="map-viewport">
                <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" aria-label="Stylized Istanbul zones">
                    <path class="district-path" id="historic" d="M300,300 L350,280 L420,320 L380,420 L310,400 Z" />
                    <text x="310" y="340" fill="white" font-size="10" opacity="0.5">Peninsula</text>

                    <path class="district-path" id="pera" d="M380,260 L450,220 L520,250 L480,300 L400,280 Z" />
                    <text x="410" y="260" fill="white" font-size="10" opacity="0.5">Beyoğlu</text>

                    <path class="district-path" id="asian" d="M550,350 L620,330 L650,450 L580,470 L520,420 Z" />
                    <text x="560" y="380" fill="white" font-size="10" opacity="0.5">Anatolia</text>

                    <path class="district-path" id="bosphorus" d="M500,250 L550,150 L580,180 L530,280 Z" />
                    <text x="520" y="210" fill="white" font-size="10" opacity="0.5">Bosphorus</text>
                </svg>
                <div id="zone-intel" class="zone-intel">SELECT_ZONE_FOR_INTELLIGENCE</div>
            </div>
        </main>

        <aside class="panel" aria-label="Sovereign feed">
            <div class="panel-header">Sovereign Feed</div>
            <div class="widget" id="main-feed"></div>
            <p id="feed-empty" class="feed-empty hidden">Eşleşen düğüm yok.</p>
        </aside>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
